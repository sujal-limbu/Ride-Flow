<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
</head>

<body>

    <nav class="accounts-nav">
        <img src="{% static 'images/ride_flow_logo_cropped.png' %}" height="50">
    </nav>

    <div class="page-wrapper">
        <div class="page">

            
            <div class="form-col">
                <div class="container">
                    <div class="heading">Register to Ride Flow</div>

                    <form class="form" method="POST">
                        {% csrf_token %}

                        <div class="input-field">
                            <input type="text" name="first_name" id="first_name" required autocomplete="off" placeholder=" ">
                            <label for="first_name">First Name</label>
                        </div>

                        <div class="input-field">
                            <input type="text" name="last_name" id="last_name" required autocomplete="off" placeholder=" ">
                            <label for="last_name">Last Name</label>
                        </div>

                        <div class="input-field">
                            <input type="text" name="username" id="username" required autocomplete="off" placeholder=" ">
                            <label for="username">Username</label>
                        </div>

                        <div class="input-field">
                            <input type="text" name="phone_number" id="phone_number" autocomplete="off" placeholder=" ">
                            <label for="phone_number">Phone Number</label>
                        </div>

                        <div class="input-field">
                            <input type="email" name="email" id="email" required autocomplete="off" placeholder=" ">
                            <label for="email">Email Address</label>
                        </div>

                        <div class="input-field">
                            <input type="password" name="password1" id="password1" required autocomplete="off" placeholder=" ">
                            <label for="password1">Password</label>
                        </div>

                        <div class="input-field">
                            <input type="password" name="password2" id="password2" required autocomplete="off" placeholder=" ">
                            <label for="password2">Confirm Password</label>
                        </div>

                        <div class="btn-container">
                            <button type="submit" class="btn">Register</button>
                            <div class="acc-text">
                                Already have an account?
                                <br>
                                <a href="{% url 'login' %}">Sign In</a>
                            </div>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
