<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
</head>

<body>

    <nav class="accounts-nav">
        <img src="{% static 'images/ride_flow_logo_cropped.png' %}" height="50">
    </nav>

    <div class="page-wrapper">
        <div class="page">

            <div class="form-col">
                <div class="container">
                    <div class="heading">Sign In to Ride Flow</div>

                    <form class="form" method="POST">
                        {% csrf_token %}

                        <div class="input-field">
                            <input type="text" name="username" id="username" required autocomplete="off" placeholder=" ">
                            <label for="username">Username</label>
                        </div>

                        <div class="input-field">
                            <input type="password" name="password" id="password" required autocomplete="off" placeholder=" ">
                            <label for="password">Password</label>
                        </div>

                        

                        <div class="btn-container">
                            <button type="submit" class="btn">Sign In</button>
                            <div class="acc-text">
                                Don't have an account?
                                <a href="{% url 'register' %}">Register</a>
                            </div>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
